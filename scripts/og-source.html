<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      }
      body {
        position: relative;
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.18), transparent 55%),
          radial-gradient(circle at 85% 78%, rgba(255, 200, 180, 0.22), transparent 55%),
          linear-gradient(165deg, #E6492C 0%, #E03657 100%);
        color: #fff;
        padding: 72px 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: -0.01em;
      }
      .logo-dot {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: #fff;
        position: relative;
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.35);
      }
      .logo-dot::before,
      .logo-dot::after {
        content: '';
        position: absolute;
        left: 7px;
        height: 3px;
        border-radius: 2px;
        background: #AE99CF;
      }
      .logo-dot::before { top: 13px; width: 18px; }
      .logo-dot::after  { top: 20px; width: 12px; }
      .eyebrow {
        display: inline-block;
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 999px;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 28px;
      }
      h1 {
        font-size: 84px;
        line-height: 1.15;
        letter-spacing: -0.02em;
        font-weight: 800;
        margin-bottom: 28px;
      }
      .accent {
        background: linear-gradient(135deg, #FFE6B5 0%, #FFD1A8 50%, #FFE6B5 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p.sub {
        font-size: 26px;
        color: rgba(255, 255, 255, 0.92);
        line-height: 1.6;
        max-width: 760px;
      }
      .badges {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 999px;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
      }
      .check {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #E03657;
        font-size: 12px;
        font-weight: 800;
      }
      .footer {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .tag {
        font-size: 20px;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 0.05em;
        text-transform: uppercase;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="logo">
        <span class="logo-dot"></span>
        <span>PeraTango</span>
      </div>
    </div>

    <div>
      <span class="eyebrow">SRS × AI × ウィジェット</span>
      <h1>
        <span class="accent">忘れる前に</span>、<br />
        ちょうどいい復習を。
      </h1>
      <p class="sub">
        フラッシュカード・AI クイズ・ロック画面ウィジェット。<br />
        科学的な間隔反復で、単語を確実に長期記憶へ。
      </p>
    </div>

    <div class="footer">
      <div class="badges">
        <span class="badge"><span class="check">✓</span>完全無料</span>
        <span class="badge"><span class="check">✓</span>広告なし</span>
        <span class="badge"><span class="check">✓</span>登録不要</span>
        <span class="badge"><span class="check">✓</span>オフライン対応</span>
      </div>
      <div class="tag">iOS App</div>
    </div>
  </body>
</html>
